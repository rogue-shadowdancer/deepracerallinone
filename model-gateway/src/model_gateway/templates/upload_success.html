{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>Submission received</h1>
  <p>Submission <strong>#{{ submission_id }}</strong> for <strong>{{ model_name }}</strong> is now waiting for admin review.</p>
  {% if warning %}
    <div class="notice">{{ warning }}</div>
  {% endif %}
  <div class="button-row">
    <a class="button-link" href="/dashboard">Dashboard</a>
    <a class="button-link secondary-link" href="/upload">Upload another model</a>
  </div>
</section>
{% endblock %}
