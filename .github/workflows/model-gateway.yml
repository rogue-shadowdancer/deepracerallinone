name: Model Gateway

on:
  push:
    paths:
      - "model-gateway/**"
      - ".github/workflows/model-gateway.yml"
  pull_request:
    paths:
      - "model-gateway/**"
      - ".github/workflows/model-gateway.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: model-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[test]"
      - run: python -m compileall src tests
      - run: python -m pytest tests

  deployment-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: model-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[test]"
      - run: bash -n scripts/run-linux.sh scripts/deploy-linux.sh
      - run: bash scripts/deploy-linux.sh --dry-run
      - run: bash scripts/deploy-linux.sh --mode dev --dry-run
      - run: pwsh -NoProfile -File scripts/deploy-windows.ps1 -DryRun
      - run: pwsh -NoProfile -File scripts/deploy-windows.ps1 -Mode dev -DryRun
      - run: pwsh -NoProfile -File scripts/run-windows.ps1 -DryRun
      - run: model-gateway-maintenance --help
      - run: python -m model_gateway.maintenance --help
      - run: docker build -t deepracer-model-gateway:test .

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Diff check
        run: git diff --check
